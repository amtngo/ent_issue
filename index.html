<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연예계 반응</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      display:flex;
      justify-content:center;
      padding:20px;
    }

    .wrap{
      width:100%;
      max-width:480px;
    }

    .topic{
      font-size:17px;
      color:#94a3b8;
      margin-bottom:10px;
    }

    .question{
      font-size:24px;
      font-weight:700;
      line-height:1.4;
      margin-bottom:28px;
    }

    .option{
      width:100%;
      border:none;
      background:#1e293b;
      color:white;
      padding:18px;
      border-radius:16px;
      margin-bottom:14px;
      font-size:17px;
      text-align:left;
      cursor:pointer;
      transition:0.2s;
    }

    .option:hover{
      background:#334155;
    }

    .resultBox{
      margin-top:40px;
      display:none;
    }

    .percent{
      font-size:56px;
      font-weight:800;
      margin-bottom:10px;
    }

    .resultText{
      font-size:20px;
      margin-bottom:24px;
      line-height:1.6;
    }

    .barWrap{
      display:flex;
      gap:6px;
      margin-bottom:24px;
    }

    .bar{
      flex:1;
      height:22px;
      border-radius:6px;
      background:#1e293b;
      opacity:0.25;
    }

    .fill-red{
      background:#fca5a5;
      opacity:1;
    }

    .fill-yellow{
      background:#fde68a;
      opacity:1;
    }

    .fill-green{
      background:#86efac;
      opacity:1;
    }

    .footer{
      margin-top:30px;
      color:#64748b;
      font-size:13px;
      line-height:1.5;
      text-align:center;
    }

    .blocked{
      font-size:20px;
      line-height:1.7;
      margin-top:50px;
      color:white;
    }
  </style>
</head>

<body>

<div class="wrap">

  <div class="topic" id="topic"></div>

  <div class="question" id="question"></div>

  <div id="options"></div>

  <div class="resultBox" id="resultBox">

    <div class="percent" id="percentText">0%</div>

    <div class="resultText" id="resultText"></div>

    <div class="barWrap" id="barWrap"></div>

  </div>

  <div class="footer">
    이 선택은 댓글 대신 반응을 남길 수 있도록 구성되었습니다
  </div>

</div>

<script src="questions.js"></script>

<script>

  const SUPABASE_URL = "https://kuqajkmildcsnxrebige.supabase.co";

  const SUPABASE_KEY = "sb_publishable_ydZnoEsI0GHkFDtufgDaqg_UtdAvk_Z";

  const params = new URLSearchParams(location.search);

  const issueId = params.get("id");

  const current = QUESTIONS.find(q => q.id === issueId);

  const topicEl = document.getElementById("topic");

  const questionEl = document.getElementById("question");

  const optionsEl = document.getElementById("options");

  const resultBox = document.getElementById("resultBox");

  const percentText = document.getElementById("percentText");

  const resultText = document.getElementById("resultText");

  const barWrap = document.getElementById("barWrap");

  const voteKey = "voted_" + issueId;

  if(!current){

    document.body.innerHTML = `
      <div style="color:white;padding:40px;font-size:20px;">
        존재하지 않는 질문입니다
      </div>
    `;

  }

  topicEl.innerText = current.topic;

  questionEl.innerText = current.question;

  // 이미 선택한 경우

  if(localStorage.getItem(voteKey) === "yes"){

    optionsEl.innerHTML = `
      <div class="blocked">
        이미 선택한 이슈입니다<br>
        같은 기기에서는 한 번만 참여할 수 있습니다
      </div>
    `;

  }

  // 처음 참여하는 경우

  else{

    current.options.forEach((option, index) => {

      const btn = document.createElement("button");

      btn.className = "option";

      btn.innerText = option;

      btn.onclick = () => vote(index);

      optionsEl.appendChild(btn);

    });

  }

  async function vote(optionIndex){

    // 중복 방지 저장

    localStorage.setItem(voteKey, "yes");

    // 버튼 잠금

    document.querySelectorAll(".option").forEach(b=>{
      b.disabled = true;
    });

    // 저장

    await fetch(`${SUPABASE_URL}/rest/v1/issue_votes`,{

      method:"POST",

      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },

      body:JSON.stringify({
        issue_id: issueId,
        option_index: optionIndex
      })

    });

    // 전체 조회

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/issue_votes?issue_id=eq.${issueId}`,
      {
        headers:{
          "apikey":SUPABASE_KEY,
          "Authorization":"Bearer " + SUPABASE_KEY
        }
      }
    );

    const rows = await res.json();

    const total = rows.length;

    const selected = rows.filter(
      r => r.option_index === optionIndex
    ).length;

    const percent = Math.round((selected / total) * 100);

    // 결과 표시

    optionsEl.style.display = "none";

    resultBox.style.display = "block";

    percentText.innerText = percent + "%";

    // 분위기 문구

    if(percent <= 25){

      resultText.innerText =
        "아직은 조심스럽게 보는 분위기가 많습니다";

    }
    else if(percent <= 50){

      resultText.innerText =
        "반응이 꽤 갈리고 있는 분위기입니다";

    }
    else if(percent <= 75){

      resultText.innerText =
        "생각보다 공감하는 반응이 많은 흐름입니다";

    }
    else{

      resultText.innerText =
        "지금 분위기가 한쪽으로 크게 기울고 있습니다";

    }

    // 그래프

    const filledCount = Math.round(percent / 10);

    barWrap.innerHTML = "";

    for(let i=0;i<10;i++){

      const bar = document.createElement("div");

      bar.className = "bar";

      if(i < filledCount){

        if(i <= 2){
          bar.classList.add("fill-red");
        }
        else if(i <= 5){
          bar.classList.add("fill-yellow");
        }
        else{
          bar.classList.add("fill-green");
        }

      }

      barWrap.appendChild(bar);

    }

  }

</script>

</body>
</html>
